<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>facecast — sender</title>
<style>
  body { font-family: sans-serif; background: #14161a; color: #e6e6e6;
         max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
  button { font-size: 1.2rem; padding: .6rem 1.4rem; border-radius: 8px;
           border: none; background: #3b82f6; color: white; cursor: pointer; }
  button:disabled { background: #555; }
  #status { margin: 1rem 0; color: #9ca3af; }
  video { width: 100%; border-radius: 8px; background: #000; margin-top: 1rem; }
  code { background: #262a31; padding: .1rem .35rem; border-radius: 4px; }
</style>
</head>
<body>
<h2>facecast — sender (PC side)</h2>
<p>Click share, pick your main display, then open
   <code id="vrUrl">/vr.html</code> on the phone.</p>
<p>For desktop audio: when the microphone prompt appears, pick
   <b>“Monitor of …”</b> (your speakers' monitor device) — that streams what
   you hear, not your mic. Cancel the prompt for video-only.</p>
<button id="startBtn">Share screen</button>
<div id="status">idle</div>
<video id="preview" autoplay muted playsinline></video>

<script>
const TEST = new URLSearchParams(location.search).has('test');
const statusEl = document.getElementById('status');
const startBtn = document.getElementById('startBtn');
const preview = document.getElementById('preview');
document.getElementById('vrUrl').textContent =
  location.protocol + '//' + location.hostname + ':' + location.port + '/vr.html';

let stream = null;
let pc = null;
let polling = false;
let viewerHost = null;  // the IP the phone dialed — preferred media path

const setStatus = (t) => { statusEl.textContent = t; };

async function post(ch, msg) {
  await fetch('/signal?ch=' + ch, { method: 'POST', body: JSON.stringify(msg) });
}

function testStream() {
  const c = document.createElement('canvas');
  c.width = 1280; c.height = 720;
  const ctx = c.getContext('2d');
  let t = 0;
  setInterval(() => {
    t += 1;
    ctx.fillStyle = '#123'; ctx.fillRect(0, 0, c.width, c.height);
    ctx.fillStyle = '#f59e0b';
    ctx.beginPath();
    ctx.arc(640 + 400 * Math.cos(t / 30), 360 + 250 * Math.sin(t / 30), 40, 0, 7);
    ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = '48px sans-serif';
    ctx.fillText('TEST STREAM  ' + t, 60, 100);
  }, 33);
  return c.captureStream(30);
}

async function newSession() {
  if (pc) pc.close();
  pc = new RTCPeerConnection();
  for (const track of stream.getTracks()) {
    if (track.kind === 'video') track.contentHint = 'detail';
    pc.addTrack(track, stream);
  }
  for (const sender of pc.getSenders()) {
    const p = sender.getParameters();
    p.degradationPreference = 'maintain-resolution';
    p.encodings = [{ maxBitrate: 20_000_000 }];
    try { await sender.setParameters(p); } catch (e) { /* optional tuning */ }
  }
  // Only advertise the address the viewer actually dialed, so media is
  // pinned to that network path (e.g. the USB cable, not Wi-Fi). If no
  // candidate matches, fall back to sending everything once gathering ends.
  const candBuf = [];
  let candMatched = false;
  pc.onicecandidate = (e) => {
    if (e.candidate) {
      const addr = e.candidate.candidate.split(' ')[4] || '';
      if (viewerHost && addr === viewerHost) {
        candMatched = true;
        post('to-viewer', { type: 'ice', candidate: e.candidate });
      } else {
        candBuf.push(e.candidate);
      }
    } else if (!candMatched) {
      for (const c of candBuf) post('to-viewer', { type: 'ice', candidate: c });
    }
  };
  pc.onconnectionstatechange = () => setStatus('viewer: ' + pc.connectionState);
  const offer = await pc.createOffer();
  try {  // ask the phone to decode opus as full stereo at a music bitrate
    offer.sdp = offer.sdp.replace(/(a=fmtp:\d+ [^\r\n]*useinbandfec=1)/g,
      '$1;stereo=1;sprop-stereo=1;maxaveragebitrate=256000');
  } catch (e) {}
  await pc.setLocalDescription(offer);
  await post('to-viewer', { type: 'offer', sdp: pc.localDescription });
  setStatus('offer sent, connecting…');
}

async function handle(msg) {
  if (msg.type === 'hello') {
    viewerHost = msg.host || null;
    await newSession();
  } else if (msg.type === 'answer' && pc) {
    await pc.setRemoteDescription(msg.sdp);
  } else if (msg.type === 'ice' && pc && pc.remoteDescription) {
    try { await pc.addIceCandidate(msg.candidate); } catch (e) {}
  }
}

async function poll() {
  if (polling) return;
  polling = true;
  while (true) {
    try {
      const r = await fetch('/signal?ch=to-sender');
      for (const raw of await r.json()) await handle(JSON.parse(raw));
    } catch (e) { /* server hiccup; keep polling */ }
    await new Promise((res) => setTimeout(res, 300));
  }
}

startBtn.onclick = async () => {
  try {
    stream = TEST ? testStream()
      : await navigator.mediaDevices.getDisplayMedia({
          video: { frameRate: 60 }, audio: false });
  } catch (e) {
    setStatus('screen share cancelled/failed: ' + e.message);
    return;
  }
  if (!TEST) {
    try {
      const audio = await navigator.mediaDevices.getUserMedia({ audio: {
        echoCancellation: false, noiseSuppression: false,
        autoGainControl: false, channelCount: 2 } });
      for (const t of audio.getAudioTracks()) {
        t.contentHint = 'music';
        stream.addTrack(t);
      }
    } catch (e) { /* denied/cancelled: video-only */ }
  }
  preview.srcObject = stream;
  startBtn.disabled = true;
  const hasAudio = stream.getAudioTracks().length > 0;
  setStatus('sharing ' + (hasAudio ? 'with audio' : '(video only)') +
            ' — waiting for the phone to open /vr.html');
  poll();
};

if (TEST) startBtn.click();
</script>
</body>
</html>
